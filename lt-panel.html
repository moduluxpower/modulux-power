<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT Panel Design | Modulux Power</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1120;
color:white;
}

header{
padding:20px;
text-align:center;
background:#111827;
}

header h1{
color:#FFD700;
font-size:42px;
}

.hero{
height:450px;
background:#1f2937;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
color:#FFD700;
font-weight:bold;
}

.gallery{
max-width:1200px;
margin:60px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:15px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

.btn{
display:block;
width:280px;
margin:50px auto;
padding:18px;
text-align:center;
background:#25D366;
color:white;
text-decoration:none;
border-radius:50px;
font-size:20px;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>LT Panel Design</h1>
</header>

<div class="hero">

</div>

<section class="gallery">

<img src="lt1.jpg">
<img src="lt2.jpg">
<img src="lt3.jpg">

<img src="lt6.jpg">

</section>

</html>
